kind = "web"
previewPath = "/"
title = "ATK Capital"
version = "1.0.0"
id = "artifacts/atk-capital"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24093

[services.development]
run = "pnpm --filter @workspace/atk-capital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atk-capital", "run", "build" ]
serve = "static"
publicDir = "artifacts/atk-capital/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24093"
BASE_PATH = "/"
